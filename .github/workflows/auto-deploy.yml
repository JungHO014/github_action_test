name: Auto Deploy

on:
  push:
    branches: [dev]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: dev
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"

      - name: Cache node_modules
        uses: actions/cache@v4
        id: node-modules-cache
        with:
          path: |
            node_modules
            .yarn/cache
            .yarn/unplugged
            .yarn/build-state.yml
            .yarn/install-state.gz
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: yarn install --frozen-lockfile

      - name: Build
        run: yarn build

      - name: Configure Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to dev_server
        run: |
          # Create and switch to dev_server branch
          git checkout -B dev_server
          # Copy all files from dev branch
          git reset --hard dev
          # Add built files
          git add dist -f
          git commit -m "Auto deploy: Copy from dev with built files"
          git push origin dev_server -f
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to main
        run: |
          # Switch to main branch
          git checkout main
          # Reset main to match dev branch
          git reset --hard dev
          # Add built files
          git add dist -f
          git commit -m "Auto deploy: Sync with dev and add built files"
          git push origin main -f
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

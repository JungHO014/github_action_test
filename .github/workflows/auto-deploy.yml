name: Auto Deploy

on:
  push:
    branches: [dev]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: dev

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        run: yarn build

      - name: Configure Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Deploy to dev_server
        run: |
          # Create and switch to dev_server branch
          git checkout -B dev_server
          # Copy all files from dev branch
          git reset --hard dev
          # Add built files
          git add dist -f
          git commit -m "Auto deploy: Copy from dev with built files"
          git push origin dev_server -f

      - name: Deploy to main
        run: |
          # Switch to main branch
          git checkout main
          # Reset main to match dev branch
          git reset --hard dev
          # Add built files
          git add dist -f
          git commit -m "Auto deploy: Sync with dev and add built files"
          git push origin main -f
